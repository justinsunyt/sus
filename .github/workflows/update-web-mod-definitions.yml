name: Update sus-web mod definitions
on:
  push:
    tags:
      - '*'

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  update-mod-definitions:
    name: Update sus-web mod definitions
    runs-on: ubuntu-latest
    steps:
    - name: Install .NET 8.0.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"

    - name: Checkout ppy/sus
      uses: actions/checkout@v4
      with:
        path: sus

    - name: Checkout ppy/sus-tools
      uses: actions/checkout@v4
      with:
        repository: ppy/sus-tools
        path: sus-tools

    - name: Checkout ppy/sus-web
      uses: actions/checkout@v4
      with:
        repository: ppy/sus-web
        path: sus-web

    - name: Setup local game checkout for tools
      run: ./UseLocalOsu.sh
      working-directory: ./sus-tools

    - name: Regenerate mod definitions
      run: dotnet run --project PerformanceCalculator -- mods > ../sus-web/database/mods.json
      working-directory: ./sus-tools

    - name: Create pull request with changes
      uses: peter-evans/create-pull-request@v6
      with:
        title: Update mod definitions
        body: "This PR has been auto-generated to update the mod definitions to match ppy/sus@${{ github.ref_name }}."
        branch: update-mod-definitions
        commit-message: Update mod definitions
        path: sus-web
        token: ${{ secrets.OSU_WEB_PULL_REQUEST_PAT }}
